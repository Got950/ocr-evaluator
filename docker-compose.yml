services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: ocr_evaluator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ocr_evaluator
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      UPLOAD_DIR: /data/uploads
      AI_GRADING_ENABLED: "true"
      MAX_CONCURRENT_EVALUATIONS: "2"
      ENABLE_RATE_LIMITING: "true"
      TRUSTED_HOSTS: "*"
      ENABLE_SECURITY_HEADERS: "true"
      GZIP_MINIMUM_SIZE: "1000"
      S3_BUCKET: ocr-evaluator-uploads
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      - db
      - redis
      - minio

  celery_worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/ocr_evaluator
      REDIS_URL: redis://redis:6379/0
      S3_BUCKET: ocr-evaluator-uploads
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
      AI_GRADING_ENABLED: "true"
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - uploads_data:/data/uploads

  flower:
    build: .
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  postgres_data:
  uploads_data:
  minio_data:
